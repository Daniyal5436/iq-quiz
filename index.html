<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQ Quiz App</title>
<link rel="manifest" href="manifest.json">

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.quiz-container{
    background:white;
    width:90%;
    max-width:400px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    margin:0;
    color:#333;
}

#questionNumber{
    margin-top:10px;
    font-weight:bold;
    color:#666;
}

#question{
    margin:20px 0;
    font-size:18px;
    font-weight:bold;
}

.option{
    background:#f1f1f1;
    margin:10px 0;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#4facfe;
    color:white;
}

.correct{
    background:#4CAF50 !important;
    color:white;
}

.wrong{
    background:#f44336 !important;
    color:white;
}

#timer{
    font-size:18px;
    margin-top:10px;
}

.progress{
    height:8px;
    background:#ddd;
    border-radius:5px;
    overflow:hidden;
    margin-top:5px;
}

.progress-bar{
    height:100%;
    background:#4facfe;
    width:100%;
    transition:width 1s linear;
}

button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    background:#4facfe;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#007bff;
}

#result{
    display:none;
}

</style>

</head>
<body>

<div class="quiz-container">

<h1>IQ Quiz</h1>

<div id="quiz">

<div id="questionNumber"></div>

<div id="timer">30</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="question"></div>

<div id="options"></div>

</div>

<div id="result">

<h2>Your IQ Score</h2>

<h1 id="iqScore"></h1>

<button onclick="startQuiz()">Try Again</button>

</div>

</div>

<script>

let questions = [];
let currentQuestion = 0;
let score = 0;
let timer;
let timeLeft = 30;

function generateQuestions(){

const questionBank = [

{
q:"Which one is different?",
options:["Cat","Dog","Car","Mouse"],
answer:"Car"
},

{
q:"Which number comes next? 2,4,8,16,?",
options:["18","24","32","30"],
answer:"32"
},

{
q:"Which is a fruit?",
options:["Car","Apple","Chair","Table"],
answer:"Apple"
},

{
q:"Which shape has 3 sides?",
options:["Circle","Square","Triangle","Rectangle"],
answer:"Triangle"
},

{
q:"Find odd one out",
options:["Pen","Pencil","Book","Banana"],
answer:"Banana"
}

];

questions = shuffle(questionBank).slice(0,5);

}

function shuffle(array){
return array.sort(()=>Math.random()-0.5);
}

function startQuiz(){

generateQuestions();

currentQuestion=0;
score=0;

document.getElementById("quiz").style.display="block";
document.getElementById("result").style.display="none";

showQuestion();

}

function showQuestion(){

resetTimer();

let q=questions[currentQuestion];

document.getElementById("questionNumber").innerHTML=
"Question "+(currentQuestion+1)+" of "+questions.length;

document.getElementById("question").innerHTML=q.q;

let optionsHTML="";

q.options.forEach(option=>{

optionsHTML+=
`<div class="option" onclick="selectAnswer(this,'${option}')">${option}</div>`;

});

document.getElementById("options").innerHTML=optionsHTML;

}

function selectAnswer(element,answer){

clearInterval(timer);

let correct=questions[currentQuestion].answer;

let options=document.querySelectorAll(".option");

options.forEach(opt=>{

if(opt.innerHTML==correct)
opt.classList.add("correct");

});

if(answer==correct){

score++;

}else{

element.classList.add("wrong");

}

setTimeout(()=>{

currentQuestion++;

if(currentQuestion<questions.length){

showQuestion();

}else{

showResult();

}

},1000);

}

function resetTimer(){

clearInterval(timer);

timeLeft=30;

document.getElementById("timer").innerHTML=timeLeft;

document.getElementById("progressBar").style.width="100%";

timer=setInterval(()=>{

timeLeft--;

document.getElementById("timer").innerHTML=timeLeft;

document.getElementById("progressBar").style.width=
(timeLeft/30*100)+"%";

if(timeLeft<=0){

clearInterval(timer);

currentQuestion++;

if(currentQuestion<questions.length){

showQuestion();

}else{

showResult();

}

}

},1000);

}

function showResult(){

document.getElementById("quiz").style.display="none";

document.getElementById("result").style.display="block";

let iq=80+(score*4);

document.getElementById("iqScore").innerHTML=iq;

}

startQuiz();

</script>

</body>
</html>
